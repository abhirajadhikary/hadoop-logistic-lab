global:
  scrape_interval: 15s

scrape_configs:
  # FastAPI
  - job_name: 'fastapi-api'
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-service:8000

  # HDFS
  - job_name: 'hdfs'
    static_configs:
      - targets:
          - namenode:9101
          - datanode:9101

  # Spark
  - job_name: 'spark'
    static_configs:
      - targets:
          - spark-master:9102
          - spark-worker:9103

  # Kafka
  - job_name: 'kafka'
    static_configs:
      - targets:
          - kafka:9308

  # Cassandra
  - job_name: 'cassandra'
    static_configs:
      - targets:
          - cassandra:9104